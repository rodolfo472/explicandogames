<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Pedidos 🍧</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;text-align:center}
.card{background:white;padding:20px;border-radius:15px;margin:20px}
.btn{padding:15px;background:#ff6f91;color:white;border:none;border-radius:10px}
.sabores{display:flex;flex-wrap:wrap;justify-content:center}
.sabor{margin:10px;padding:10px;border:2px solid #ddd;border-radius:10px;cursor:pointer}
.sabor img{width:80px;border-radius:10px}
.selected{border:2px solid #ff6f91}
</style>
</head>

<body>

<h2>Gelatinas do Rodolfo 🍧</h2>

<button class="btn" onclick="abrir()">Fazer Pedido</button>

<div id="form" style="display:none">

<input id="nome" placeholder="Seu nome"><br><br>

<h3>Escolha o sabor</h3>
<div id="sabores" class="sabores"></div>

<h3>Horário</h3>
<select id="horario">
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
</select>

<br><br>
<input id="rua" placeholder="Sua rua">

<br><br>
<button class="btn" onclick="enviar()">Enviar Pedido</button>

</div>

<h3 id="msg"></h3>

<script>

let saborEscolhido=null;

function abrir(){
  form.style.display="block";
  carregarSabores();
}

function carregarSabores(){
  let sabores = JSON.parse(localStorage.getItem("sabores"))||[];

  let div = document.getElementById("sabores");
  div.innerHTML="";

  sabores.forEach(s=>{
    let el = document.createElement("div");
    el.className="sabor";

    el.innerHTML=`
      <img src="${s.img}">
      <br>${s.nome}
    `;

    el.onclick=()=>{
      document.querySelectorAll(".sabor").forEach(x=>x.classList.remove("selected"));
      el.classList.add("selected");
      saborEscolhido=s.nome;
    }

    div.appendChild(el);
  });
}

function enviar(){
  let pedidos = JSON.parse(localStorage.getItem("pedidos"))||[];

  pedidos.push({
    nome:nome.value,
    sabor:saborEscolhido,
    horario:horario.value,
    rua:rua.value
  });

  localStorage.setItem("pedidos",JSON.stringify(pedidos));

  msg.innerText="Pedido feito com sucesso 🍧🔥";
}

</script>

</body>
</html>
