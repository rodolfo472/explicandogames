<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gelatinas do Rodolfo - Pedidos 🍧</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: pink;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .tag {
      display: inline-block;
      padding: 8px 12px;
      background: #eee;
      border-radius: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .tag.selected {
      background: pink;
    }

    .horario {
      display: inline-block;
      padding: 10px;
      border-radius: 10px;
      background: #eee;
      margin: 5px;
      cursor: pointer;
    }

    .horario.selected {
      background: pink;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- TELA INICIAL -->
  <div id="home" class="card">
    <h1>Gelatinas do Rodolfo 🍧</h1>
    <p>Escolha sabores e horário</p>
    <button class="btn" onclick="abrirPedido()">Fazer Pedido</button>
  </div>

  <!-- TELA PEDIDO -->
  <div id="pedido" class="card hidden">

    <h2>Novo Pedido</h2>

    <input type="text" id="nome" placeholder="Seu nome">

    <h3>Sabores</h3>
    <div id="sabores"></div>

    <h3>Horários</h3>
    <div id="horarios"></div>

    <button class="btn" onclick="enviarPedido()">Enviar pedido</button>
    <br><br>
    <button onclick="voltar()">Cancelar</button>

  </div>

</div>

<script>

let sabores = ["Morango","Limão","Uva","Abacaxi","Coco"];
let horarios = ["09:00","10:00","11:00","13:00","15:00"];

let selecionados = [];
let horarioEscolhido = null;

function abrirPedido(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("pedido").classList.remove("hidden");
  carregar();
}

function voltar(){
  document.getElementById("pedido").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

function carregar(){
  let s = document.getElementById("sabores");
  let h = document.getElementById("horarios");

  s.innerHTML = "";
  h.innerHTML = "";

  sabores.forEach(sabor=>{
    let el = document.createElement("div");
    el.className="tag";
    el.innerText=sabor;

    el.onclick=()=>{
      el.classList.toggle("selected");
      if(selecionados.includes(sabor)){
        selecionados = selecionados.filter(x=>x!=sabor);
      }else{
        selecionados.push(sabor);
      }
    }

    s.appendChild(el);
  });

  horarios.forEach(hora=>{
    let el = document.createElement("div");
    el.className="horario";
    el.innerText=hora;

    el.onclick=()=>{
      document.querySelectorAll(".horario").forEach(x=>x.classList.remove("selected"));
      el.classList.add("selected");
      horarioEscolhido = hora;
    }

    h.appendChild(el);
  });
}

function enviarPedido(){
  let nome = document.getElementById("nome").value;

  if(!nome || selecionados.length==0 || !horarioEscolhido){
    alert("Preencha tudo!");
    return;
  }

  let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

  pedidos.push({
    nome,
    sabores: selecionados,
    horario: horarioEscolhido,
    status: "Pendente"
  });

  localStorage.setItem("pedidos", JSON.stringify(pedidos));

  alert("Pedido enviado 🍧");

  voltar();
}

</script>

</body>
</html>
