<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Gelatinas do Rodolfo - Pedidos 🍧</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="brand">
      <div class="logo">🍧</div>
      <div class="title">
        <div class="name">Gelatinas do Rodolfo</div>
        <div class="subtitle">Pedidos</div>
      </div>
    </header>

    <section class="hero">
      <p class="tagline">Gelatinas artesanais — escolha sabores e horário</p>
      <button id="openOrderBtn" class="big-btn">Fazer Pedido</button>
    </section>

    <section class="orders-summary" aria-live="polite">
      <h3>Pedidos recentes</h3>
      <ul id="recentOrders" class="list"></ul>
    </section>

    <!-- Modal / Bottom sheet style form -->
    <div id="overlay" class="overlay hidden" role="dialog" aria-modal="true">
      <div class="sheet">
        <div class="sheet-header">
          <strong>Novo pedido</strong>
          <button id="closeBtn" class="icon-btn" aria-label="Fechar">✕</button>
        </div>

        <form id="orderForm" class="form">
          <label class="field">
            <span>Nome do cliente</span>
            <input id="clientName" name="clientName" type="text" placeholder="Seu nome" required />
          </label>

          <div class="field">
            <span>Sabores</span>
            <div id="flavorsContainer" class="chips"></div>
            <small id="noFlavors" class="muted">Nenhum sabor disponível</small>
          </div>

          <div class="field">
            <span>Horários</span>
            <div id="timesContainer" class="times"></div>
            <small id="noTimes" class="muted">Nenhum horário disponível</small>
          </div>

          <div class="actions">
            <button type="submit" id="submitBtn" class="big-btn primary">Enviar pedido</button>
            <button type="button" id="cancelBtn" class="big-btn secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status"></div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
