<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>LEVELKILL</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "nipplejs": "https://esm.sh/nipplejs@0.9.0"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <canvas id="game" width="960" height="540"></canvas>

    <!-- UI layers -->
    <div id="ui">
      <div id="startScreen" class="overlay">
        <h1>LEVELKILL</h1>
        <button id="playBtn" class="big">JOGAR</button>
      </div>

      <div id="hud" class="hidden">
        <div id="levelText">Level 1</div>
        <div id="swordCount">Espada: 0</div>
      </div>

      <div id="gameOver" class="overlay hidden">
        <h2>GAME OVER</h2>
        <button id="retryBtn" class="big">REINICIAR</button>
      </div>

      <!-- mobile controls -->
      <div id="mobileControls" class="hidden" aria-hidden="true">
        <div id="leftBtn" class="touchBtn">◀</div>
        <div id="rightBtn" class="touchBtn">▶</div>
      </div>

      <!-- jump button moved to bottom-right -->
      <div id="jumpBtn" class="touchBtn hidden" aria-hidden="true">▲</div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
